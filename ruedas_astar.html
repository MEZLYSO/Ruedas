<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asignación Óptima de Ruedas — A*</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Syne', sans-serif; background: #f5f2ee; }
    .mono { font-family: 'Space Mono', monospace; }
    input[type=number]::-webkit-inner-spin-button { opacity: 1; }
    .cell-input {
      width: 72px;
      text-align: center;
      border: 1.5px solid #d1ccc5;
      border-radius: 6px;
      padding: 4px 6px;
      background: white;
      font-family: 'Space Mono', monospace;
      font-size: 14px;
      transition: border-color .15s, box-shadow .15s;
      outline: none;
    }
    .cell-input:focus { border-color: #3d6b4f; box-shadow: 0 0 0 3px #3d6b4f22; }
    .highlight { background: #e8f5ec !important; }
    .tag {
      display: inline-block;
      background: #3d6b4f;
      color: white;
      border-radius: 4px;
      padding: 1px 8px;
      font-size: 11px;
      font-family: 'Space Mono', monospace;
      letter-spacing: .04em;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .fade-up { animation: fadeUp .35s ease both; }
  </style>
</head>
<body class="min-h-screen flex items-start justify-center pt-12 pb-16 px-4">

  <div class="w-full max-w-xl">

    <!-- Header -->
    <div class="mb-8">
      <p class="mono text-xs text-stone-400 uppercase tracking-widest mb-1">Algoritmo A★</p>
      <h1 class="text-3xl font-extrabold text-stone-800 leading-tight">Asignación óptima<br>de ruedas</h1>
      
    </div>

    <!-- Price matrix -->
    <div class="bg-white rounded-2xl shadow-sm border border-stone-200 p-6 mb-4">
      <p class="text-xs mono text-stone-400 mb-4 uppercase tracking-wider">Precios por empresa</p>

      <div class="overflow-x-auto">
        <table class="w-full border-separate border-spacing-y-2" id="priceTable">
          <thead>
            <tr>
              <th class="text-left text-xs font-semibold text-stone-400 pb-1 w-24"></th>
              <th class="text-center text-xs font-semibold text-stone-500 pb-1">Tipo T</th>
              <th class="text-center text-xs font-semibold text-stone-500 pb-1">Tipo H</th>
              <th class="text-center text-xs font-semibold text-stone-500 pb-1">Tipo V</th>
              <th class="text-center text-xs font-semibold text-stone-500 pb-1">Tipo W</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>

      <!-- Buttons -->
      <div class="flex gap-3 mt-6">
        <button id="solveButton" type="button"
          class="flex-1 bg-stone-800 hover:bg-stone-700 active:scale-95 text-white text-sm font-bold py-3 rounded-xl transition-all">
          Calcular asignación óptima
        </button>
        <button id="resetButton" type="button"
          class="px-5 bg-stone-100 hover:bg-stone-200 active:scale-95 text-stone-600 text-sm font-semibold py-3 rounded-xl transition-all">
          Reset
        </button>
      </div>
    </div>

    <!-- Result -->
    <div id="result" class="hidden bg-white rounded-2xl shadow-sm border border-stone-200 p-6 fade-up">
      <p class="text-xs mono text-stone-400 uppercase tracking-wider mb-4">Resultado</p>

      <!-- Stats row -->
      <div class="grid grid-cols-2 gap-3 mb-5">
        <div class="bg-stone-50 rounded-xl px-4 py-3">
          <p class="text-xs text-stone-400 mono mb-1">Heurística admisible</p>
          <p id="heurValue" class="text-xl font-extrabold text-stone-800 mono"></p>
        </div>
        <div class="bg-[#3d6b4f] rounded-xl px-4 py-3">
          <p class="text-xs text-emerald-200 mono mb-1">Costo total óptimo</p>
          <p id="totalValue" class="text-xl font-extrabold text-white mono"></p>
        </div>
      </div>

      <!-- Assignment table -->
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-stone-100">
            <th class="text-left pb-2 text-stone-400 font-normal text-xs">Empresa</th>
            <th class="text-left pb-2 text-stone-400 font-normal text-xs">Tipo</th>
            <th class="text-right pb-2 text-stone-400 font-normal text-xs">Precio</th>
          </tr>
        </thead>
        <tbody id="resultBody" class="divide-y divide-stone-50"></tbody>
      </table>
    </div>

  </div>

  <script src="ruedas_astar.js"></script>
</body>
</html>
